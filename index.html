<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Portfolio</title>
    <style>
      * { margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; min-height: 100vh; background: #1a1a1a; }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        min-width: 300px;
        min-height: 300px;
      }
      canvas:not(#cockpit-overlay) {
        position: relative;
        z-index: 0;
      }
    </style>
  </head>
  <body>
    <canvas></canvas>
    <canvas id="cockpit-overlay" style="
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    "></canvas>
    <div id="docked-overlay" style="
      position: fixed;
      inset: 0;
      background: #000;
      pointer-events: none;
      z-index: 1;
      transition: opacity 0.3s ease;
    "></div>
    <script type="module" src="/webgpu/main.ts"></script>
  </body>
</html>
